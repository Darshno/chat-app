<!doctype html>
<html>
  <head>
    <title>Live Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        background: #0f172a;
        font-family: Arial;
        display: flex;
        justify-content: center;
        padding-top: 40px;
        color: white;
      }
      .chat {
        width: 100%;
        max-width: 400px;
        background: #020617;
        padding: 15px;
        border-radius: 10px;
      }
      input,
      button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 6px;
        border: none;
      }
      button {
        background: #22c55e;
        font-weight: bold;
      }
      ul {
        list-style: none;
        padding: 0;
        height: 250px;
        overflow-y: auto;
      }
      li {
        background: #1e293b;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 6px;
      }
      #users {
        margin-bottom: 10px;
        font-size: 14px;
      }
      #users span {
        display: block;
        cursor: pointer;
        padding: 5px;
        background: #1e293b;
        margin-bottom: 4px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="login" id="login">
      <h3>Enter Username</h3>
      <input id="username" placeholder="Username" />
      <button onclick="join()">Join</button>
    </div>
    <div class="chat">
      <input id="username" />
      <div id="login"></div>

      <div id="chat"></div>
      <div id="users"></div>

      <ul id="messages"></ul>
      <input id="msg" />
      <button onclick="send()">Send</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      // connect to socket.io server
      const socket = io(); // same-origin (Render / deployed)

      // =======================
      // STATE
      // =======================
      let currentUser = "";
      let selectedUser = "";

      // =======================
      // LOGIN
      // =======================
      function join() {
        console.log("JOIN CLICKED"); // 👈 DEBUG
      }

      // =======================
      // ONLINE USERS LIST
      // =======================
      socket.on("user_list", (users) => {
        const usersDiv = document.getElementById("users");
        usersDiv.innerHTML = "<b>Online Users</b>";

        users.forEach((user) => {
          if (user === currentUser) return;

          const span = document.createElement("span");
          span.innerText = user;
          span.onclick = () => {
            selectedUser = user;
            document.getElementById("messages").innerHTML = "";
          };

          usersDiv.appendChild(span);
        });
      });

      // =======================
      // SEND PRIVATE MESSAGE
      // =======================
      function send() {
        const msgInput = document.getElementById("msg");
        const text = msgInput.value.trim();

        if (!text) return;
        if (!selectedUser) {
          alert("Select a user to chat with");
          return;
        }

        socket.emit("private_message", {
          to: selectedUser,
          message: text,
        });

        addMessage("You", text);
        msgInput.value = "";
      }

      // =======================
      // RECEIVE PRIVATE MESSAGE
      // =======================
      socket.on("receive_private", (data) => {
        addMessage(data.from, data.message);
      });

      // =======================
      // MESSAGE RENDER
      // =======================
      function addMessage(user, text) {
        const li = document.createElement("li");
        li.innerText = `${user}: ${text}`;
        document.getElementById("messages").appendChild(li);
      }
      document.getElementById("username").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          join();
        }
      });
    </script>
  </body>
</html>
